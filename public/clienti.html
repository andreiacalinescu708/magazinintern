<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Administrare clienți</title>
  
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="global.css">
  
  <style>
    body { 
      background: #0f172a; 
      color: white; 
      font-family: 'Segoe UI', sans-serif; 
      margin: 0;
      min-height: 100vh;
    }
    
    .topbar { 
      background: #0284c7; 
      padding: 1rem 2rem; 
      display: flex; 
      justify-content: space-between; 
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .topbar h2 { margin: 0; font-size: 1.5rem; }
    
    .btnBack { 
      color: white; 
      text-decoration: none; 
      font-weight: 500;
      padding: 0.5rem 1rem;
      background: rgba(255,255,255,0.15);
      border-radius: 0.5rem;
      transition: background 0.3s;
    }
    .btnBack:hover { background: rgba(255,255,255,0.25); }
    
    .container { 
      max-width: 1400px; 
      margin: 2rem auto; 
      padding: 0 1rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }
    
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
    
    .card { 
      background: #1e293b; 
      border-radius: 1rem; 
      padding: 1.5rem; 
      border: 1px solid #334155;
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 2px solid #0284c7;
    }
    
    .card-header h3 { margin: 0; font-size: 1.25rem; }
    
    .input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      background: #0f172a;
      color: white;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    
    .input:focus {
      outline: none;
      border-color: #0284c7;
    }
    
    select.input {
      cursor: pointer;
    }
    
    .btnPrimary {
      background: #0284c7;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }
    .btnPrimary:hover { background: #0369a1; }
    
    .btnSecondary {
      background: #334155;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 500;
      transition: background 0.3s;
    }
    .btnSecondary:hover { background: #475569; }
    
    .btnSuccess {
      background: #10b981;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btnSuccess:hover { background: #059669; }
    
    .client-list {
      max-height: 500px;
      overflow-y: auto;
    }
    
    .client-item {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #334155;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .client-item:hover { 
      background: #0f172a; 
    }
    
    .client-item.active {
      background: rgba(2, 132, 199, 0.2);
      border-left: 3px solid #0284c7;
    }
    
    .client-name { font-weight: 500; }
    .client-category { 
      font-size: 0.8rem; 
      color: #94a3b8;
      background: #334155;
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: #64748b;
    }
    
    /* Detalii client */
    .detail-row {
      margin-bottom: 1rem;
    }
    
    .detail-label {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }
    
    .detail-value {
      font-size: 1.1rem;
      font-weight: 500;
    }
    
    .cui-badge {
      background: rgba(2, 132, 199, 0.2);
      color: #38bdf8;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      display: inline-block;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    
    /* Categorie editor */
    .category-editor {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }
    
    .category-editor select {
      flex: 1;
    }
    
    .category-editor input {
      flex: 1;
      display: none;
    }
    
    .msg {
      margin-top: 0.5rem;
      font-size: 0.9rem;
      min-height: 1.5rem;
    }
    
    .msg.success { color: #10b981; }
    .msg.error { color: #ef4444; }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
    }
    
    .modal.active { display: flex; }
    
    .modal-content {
      background: #1e293b;
      border-radius: 1rem;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      border: 1px solid #334155;
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      border-bottom: 1px solid #334155;
    }
    
    .modal-header h3 { margin: 0; }
    
    .modal-close {
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    .modal-close:hover { color: white; }
    
    .modal-body {
      padding: 1.5rem;
    }
    
    .form-group {
      margin-bottom: 1rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #94a3b8;
      font-size: 0.9rem;
    }
    
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    
    @media (max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
    }
    
    .hidden { display: none !important; }
    
    /* Preturi speciale */
    .price-item {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
      align-items: center;
    }
    
    .price-item select, .price-item input {
      margin-bottom: 0;
    }
    
    .btn-remove {
      background: #ef4444;
      color: white;
      border: none;
      padding: 0.5rem;
      border-radius: 0.25rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="btnBack">← Înapoi</a>
    <h2>Administrare Clienți</h2>
    <div id="userBar"></div>
  </div>

  <div class="container">
    <!-- Lista Clienți -->
    <div class="card">
      <div class="card-header">
        <h3>📋 Lista Clienți</h3>
        <button class="btnPrimary" onclick="openModal()">➕ Adaugă</button>
      </div>
      
      <input type="text" id="searchInput" class="input" placeholder="Caută client...">
      
      <div id="clientsList" class="client-list">
        <div class="empty-state">Se încarcă...</div>
      </div>
    </div>

    <!-- Detalii Client -->
    <div class="card">
      <div class="card-header">
        <h3>📄 Detalii Client</h3>
      </div>
      
      <div id="clientDetails">
        <div class="empty-state">Selectează un client din listă</div>
      </div>
    </div>
  </div>

  <!-- Modal Adaugă Client -->
  <div id="addModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>➕ Adaugă Client Nou</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      
      <div class="modal-body">
        <form id="addClientForm">
          <div class="form-group">
            <label>Nume firmă / farmacie *</label>
            <input type="text" id="newName" class="input" placeholder="ex: Farmacia Tei" required>
          </div>
          
          <div class="form-row">
            <div class="form-group">
              <label>CUI Firmă</label>
              <input type="text" id="newCui" class="input" placeholder="RO12345678">
            </div>
            
            <div class="form-group">
              <label>Grup *</label>
              <select id="newGroup" class="input" required onchange="onGroupChange()">
                <option value="">-- Selectează --</option>
                <option value="Craiova">📍 Craiova</option>
                <option value="Exterior">🌍 Exterior</option>
              </select>
            </div>
          </div>
          
          <div class="form-group" id="zoneGroup">
            <label>Zonă / Categorie *</label>
            <select id="newZone" class="input">
              <option value="">-- Selectează zona --</option>
            </select>
            <input type="text" id="newCategoryText" class="input" placeholder="Sau introdu categorie nouă...">
          </div>
          
          <hr style="border-color: #334155; margin: 1.5rem 0;">
          
          <div class="form-group">
            <label>💰 Prețuri speciale (opțional)</label>
            <div id="pricesContainer"></div>
            <button type="button" class="btnSecondary" onclick="addPriceRow()" style="margin-top: 0.5rem;">
              ➕ Adaugă preț
            </button>
          </div>
          
          <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
            <button type="submit" class="btnPrimary" style="flex: 1;">💾 Salvează</button>
            <button type="button" class="btnSecondary" onclick="closeModal()">Anulează</button>
          </div>
          
          <div id="formMsg" class="msg"></div>
        </form>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  
  <script>
    let allClients = [];
    let allCategories = [];
    let selectedClient = null;
    let products = [];

    // Zone predefinite pentru Exterior
    const exteriorZones = [
      'Vâlcea - Râmnicu Vâlcea',
      'Vâlcea - Drăgășani',
      'Gorj - Târgu Jiu',
      'Gorj - Motru',
      'Mehedinți - Drobeta',
      'Olt - Slatina',
      'Olt - Caracal',
      'Teleorman - Alexandria',
      'Argeș - Pitești',
      'Argeș - Câmpulung'
    ];

    // Încarcă date la pornire
    async function init() {
      await Promise.all([
        loadClients(),
        loadCategories(),
        loadProducts()
      ]);
    }

    async function loadClients() {
      try {
        const res = await fetch('/api/clients-flat');
        allClients = await res.json();
        renderClientList(allClients);
      } catch (e) {
        console.error('Eroare la încărcarea clienților:', e);
        document.getElementById('clientsList').innerHTML = 
          '<div class="empty-state">Eroare la încărcare</div>';
      }
    }

    async function loadCategories() {
      try {
        const res = await fetch('/api/client-categories');
        allCategories = await res.json();
      } catch (e) {
        console.error('Eroare la încărcarea categoriilor:', e);
      }
    }

    async function loadProducts() {
      try {
        const res = await fetch('/api/products-flat');
        products = await res.json();
      } catch (e) {
        console.error('Eroare la încărcarea produselor:', e);
      }
    }

    function renderClientList(clients) {
      const container = document.getElementById('clientsList');
      
      if (clients.length === 0) {
        container.innerHTML = '<div class="empty-state">Niciun client găsit</div>';
        return;
      }
      
      container.innerHTML = clients.map(c => `
        <div class="client-item ${selectedClient?.id === c.id ? 'active' : ''}" 
             onclick="selectClient('${c.id}')">
          <span class="client-name">${escapeHtml(c.name)}</span>
          <span class="client-category">${escapeHtml(c.category || '-')}</span>
        </div>
      `).join('');
    }

    function selectClient(id) {
      selectedClient = allClients.find(c => c.id === id);
      renderClientList(allClients); // re-render pentru highlight
      renderClientDetails();
    }

    function renderClientDetails() {
      const container = document.getElementById('clientDetails');
      
      if (!selectedClient) {
        container.innerHTML = '<div class="empty-state">Selectează un client din listă</div>';
        return;
      }

      const c = selectedClient;
      const prices = c.prices || {};
      const priceEntries = Object.entries(prices);
      
      // Generează options pentru categorii
      const categoryOptions = allCategories.map(cat => 
        `<option value="${escapeHtml(cat)}" ${cat === c.category ? 'selected' : ''}>${escapeHtml(cat)}</option>`
      ).join('');

      container.innerHTML = `
        <h2 style="margin-top: 0; margin-bottom: 0.5rem;">${escapeHtml(c.name)}</h2>
        
        ${c.cui ? `<div class="cui-badge">🏢 CUI: ${escapeHtml(c.cui)}</div>` : ''}
        
        <div class="detail-row">
          <div class="detail-label">Grup</div>
          <div class="detail-value">${escapeHtml(c.group || '-')}</div>
        </div>
        
        <div class="detail-row">
          <div class="detail-label">Categorie / Zonă</div>
          <div class="detail-value">${escapeHtml(c.category || '-')}</div>
          
          <div class="category-editor">
            <select id="editCategory" class="input">
              <option value="">-- Schimbă în --</option>
              ${categoryOptions}
              <option value="__new__">+ Categorie nouă...</option>
            </select>
            <input type="text" id="newCategoryInput" class="input" placeholder="Categorie nouă...">
            <button class="btnSuccess" onclick="saveCategory()">Salvează</button>
          </div>
          <div id="categoryMsg" class="msg"></div>
        </div>
        
        ${priceEntries.length > 0 ? `
          <hr style="border-color: #334155; margin: 1.5rem 0;">
          <h4 style="margin-bottom: 1rem;">💰 Prețuri Speciale (${priceEntries.length})</h4>
          <div style="background: #0f172a; padding: 1rem; border-radius: 0.5rem;">
            ${priceEntries.map(([prodId, price]) => {
              const prod = products.find(p => String(p.id) === String(prodId));
              const prodName = prod ? prod.name : `Produs ${prodId}`;
              return `
                <div style="display: flex; justify-content: space-between; padding: 0.5rem 0; border-bottom: 1px solid #334155;">
                  <span>${escapeHtml(prodName)}</span>
                  <span style="color: #38bdf8; font-weight: 600;">${Number(price).toFixed(2)} RON</span>
                </div>
              `;
            }).join('')}
          </div>
        ` : '<p style="color: #64748b; font-style: italic;">Nu are prețuri speciale</p>'}
      `;

      // Handler pentru schimbarea categoriei
      const catSelect = document.getElementById('editCategory');
      const catInput = document.getElementById('newCategoryInput');
      
      if (catSelect) {
        catSelect.onchange = () => {
          if (catSelect.value === '__new__') {
            catInput.style.display = 'block';
            catInput.focus();
          } else {
            catInput.style.display = 'none';
          }
        };
      }
    }

    async function saveCategory() {
      if (!selectedClient) return;
      
      const select = document.getElementById('editCategory');
      const input = document.getElementById('newCategoryInput');
      const msg = document.getElementById('categoryMsg');
      
      let category = select.value === '__new__' ? input.value.trim() : select.value;
      
      if (!category) {
        msg.textContent = '❌ Selectează sau introdu o categorie';
        msg.className = 'msg error';
        return;
      }
      
      try {
        const res = await fetch(`/api/clients/${selectedClient.id}/category`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ category })
        });
        
        if (res.ok) {
          msg.textContent = '✅ Categorie salvată!';
          msg.className = 'msg success';
          selectedClient.category = category;
          await loadCategories(); // Reîncarcă lista de categorii
          setTimeout(() => {
            renderClientList(allClients);
            renderClientDetails();
          }, 500);
        } else {
          const data = await res.json();
          msg.textContent = '❌ ' + (data.error || 'Eroare');
          msg.className = 'msg error';
        }
      } catch (e) {
        msg.textContent = '❌ Eroare de rețea';
        msg.className = 'msg error';
      }
    }

    // Modal funcții
    function openModal() {
      document.getElementById('addModal').classList.add('active');
      document.getElementById('newName').focus();
    }

    function closeModal() {
      document.getElementById('addModal').classList.remove('active');
      document.getElementById('addClientForm').reset();
      document.getElementById('pricesContainer').innerHTML = '';
      document.getElementById('formMsg').textContent = '';
      document.getElementById('zoneGroup').style.display = 'none';
    }

    function onGroupChange() {
      const group = document.getElementById('newGroup').value;
      const zoneSelect = document.getElementById('newZone');
      const zoneGroup = document.getElementById('zoneGroup');
      const catInput = document.getElementById('newCategoryText');
      
      if (!group) {
        zoneGroup.style.display = 'none';
        return;
      }
      
      zoneGroup.style.display = 'block';
      
      if (group === 'Craiova') {
        zoneSelect.innerHTML = '<option value="Craiova">Craiova</option>';
        zoneSelect.value = 'Craiova';
        zoneSelect.style.display = 'block';
        catInput.style.display = 'none';
      } else if (group === 'Exterior') {
        zoneSelect.innerHTML = `
          <option value="">-- Selectează județul --</option>
          ${exteriorZones.map(z => `<option value="${z}">${z}</option>`).join('')}
          <option value="__new__">+ Județ nou...</option>
        `;
        zoneSelect.style.display = 'block';
        catInput.style.display = 'none';
        
        zoneSelect.onchange = () => {
          if (zoneSelect.value === '__new__') {
            catInput.style.display = 'block';
            catInput.placeholder = 'Introdu numele județului...';
            catInput.focus();
          } else {
            catInput.style.display = 'none';
          }
        };
      }
    }

    function addPriceRow() {
      const container = document.getElementById('pricesContainer');
      const rowId = Date.now();
      
      const row = document.createElement('div');
      row.className = 'price-item';
      row.id = `price-${rowId}`;
      
      row.innerHTML = `
        <select class="input product-select" style="flex: 2;">
          <option value="">-- Selectează produs --</option>
          ${products.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('')}
        </select>
        <input type="number" class="input" placeholder="Preț" step="0.01" min="0" style="flex: 1;">
        <button type="button" class="btn-remove" onclick="document.getElementById('price-${rowId}').remove()">✕</button>
      `;
      
      container.appendChild(row);
    }

    // Submit form
    document.getElementById('addClientForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const name = document.getElementById('newName').value.trim();
      const cui = document.getElementById('newCui').value.trim();
      const group = document.getElementById('newGroup').value;
      const zone = document.getElementById('newZone').value;
      const catInput = document.getElementById('newCategoryText').value.trim();
      
      let category = zone === '__new__' ? catInput : (zone || group);
      
      if (!name || !group || !category) {
        document.getElementById('formMsg').textContent = '❌ Completează toate câmpurile obligatorii';
        document.getElementById('formMsg').className = 'msg error';
        return;
      }
      
      // Colectează prețurile
      const prices = {};
      document.querySelectorAll('.price-item').forEach(row => {
        const selects = row.querySelectorAll('select, input');
        const prodId = selects[0].value;
        const price = selects[1].value;
        if (prodId && price) {
          prices[prodId] = parseFloat(price);
        }
      });
      
      try {
        const res = await fetch('/api/clients', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, cui, group, category, prices })
        });
        
        if (res.ok) {
          document.getElementById('formMsg').textContent = '✅ Client adăugat cu succes!';
          document.getElementById('formMsg').className = 'msg success';
          setTimeout(() => {
            closeModal();
            loadClients();
            loadCategories();
          }, 1000);
        } else {
          const data = await res.json();
          document.getElementById('formMsg').textContent = '❌ ' + (data.error || 'Eroare');
          document.getElementById('formMsg').className = 'msg error';
        }
      } catch (err) {
        document.getElementById('formMsg').textContent = '❌ Eroare de rețea';
        document.getElementById('formMsg').className = 'msg error';
      }
    };

    // Search
    document.getElementById('searchInput').oninput = (e) => {
      const q = e.target.value.toLowerCase();
      const filtered = allClients.filter(c => 
        c.name.toLowerCase().includes(q) ||
        (c.category && c.category.toLowerCase().includes(q))
      );
      renderClientList(filtered);
    };

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Init
    init();
  </script>
</body>
</html>
